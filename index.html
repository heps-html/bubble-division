<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>泡泡消消除：連減大變身 (完整整合版)</title>
    <style>
        :root {
            --color-pool-bg: #e0f7fa;
            --color-group-bg: #e8f5e9;
            --color-formula-bg: #fffde7;
            --color-longdiv-bg: #f3e5f5;
            --bubble-yellow: #fff176;
            --bubble-green: #81c784;
            --main-btn: #03a9f4;
            --reset-btn: #ff7043;
        }

        body { 
            font-family: 'Segoe UI', 'Microsoft JhengHei', sans-serif; 
            text-align: center; 
            margin: 0; padding: 10px; 
            background-color: #f0f0f0; 
        }

        .section { border-radius: 15px; padding: 15px; margin-bottom: 15px; box-shadow: 0 3px 6px rgba(0,0,0,0.1); overflow: hidden; }
        #setup { background: white; max-width: 600px; margin: 10px auto; padding: 20px; }
        input[type="number"] { width: 60px; font-size: 1.2rem; padding: 5px; text-align: center; }

        #game-container { max-width: 1100px; margin: auto; display: flex; flex-direction: column; gap: 10px; }

        #pool-section { background-color: var(--color-pool-bg); border: 4px solid #00bcd4; }
        .bubble-area { display: grid; grid-template-columns: repeat(auto-fill, minmax(35px, 1fr)); gap: 8px; padding: 10px; justify-items: center; }
        
        .bubble { width: 35px; height: 35px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold; box-shadow: 0 3px 5px rgba(0,0,0,0.2); position: relative; font-size: 0.8rem;}
        .pool-bubble { background: var(--bubble-yellow); border: 2px solid #fbc02d; }

        .main-flex { display: flex; gap: 20px; align-items: flex-start; margin-top: 10px; }
        .left-col { flex: 1.2; }
        .right-col { flex: 1; display: flex; flex-direction: column; gap: 15px; }

        #groups-section { background-color: var(--color-group-bg); border: 3px dashed #4caf50; min-height: 200px; }
        #groups-container { display: flex; flex-wrap: wrap; justify-content: flex-start; gap: 10px; }
        .group-box { display: flex; flex-direction: column; align-items: center; border: 1px solid #81c784; background: white; padding: 5px; border-radius: 8px; }
        .group-bubble { background: var(--bubble-green); border: 2px solid #4caf50; margin-bottom: 3px; }

        #formula-section { background-color: var(--color-formula-bg); border: 2px solid #fbc02d; text-align: left; font-size: 1.4rem; }
        #summary-formula { margin-top: 10px; padding-top: 10px; border-top: 1px dashed #fbc02d; font-weight: bold; color: #a52a2a; }
        
        #longdiv-section { background-color: var(--color-longdiv-bg); border: 2px solid #ba68c8; }

        .long-div-wrapper {
            display: inline-block;
            margin: 20px auto;
            font-size: 2.8rem;
            font-family: 'Consolas', 'Courier New', monospace;
            line-height: 1.1;
        }

        .ld-table { border-collapse: collapse; margin: auto; }
        .ld-divisor-cell { padding-right: 12px; vertical-align: bottom; padding-bottom: 12px; font-weight: bold; }
        .ld-quotient-row td { color: red; text-align: right; padding-right: 12px; font-weight: bold; }
        .ld-dividend-cell { border-top: 5px solid #333; border-left: 5px solid #333; border-top-left-radius: 15px; padding: 8px 12px 8px 18px; text-align: right; }
        .ld-sub-row td { text-align: right; padding: 5px 12px 5px 0; }
        .ld-hr-row td { border-bottom: 5px solid #333; height: 2px; }
        .ld-rem-row td { text-align: right; padding: 8px 12px 0 0; color: blue; font-weight: bold; min-height: 1em; }

        button { padding: 10px 20px; border-radius: 20px; border: none; cursor: pointer; font-size: 1rem; transition: 0.2s; font-weight: bold; }
        #subtract-btn { background: var(--main-btn); color: white; box-shadow: 0 4px 0 #0288d1; margin: 10px; }
        #reset-btn { background: var(--reset-btn); color: white; box-shadow: 0 4px 0 #d84315; margin: 10px; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

<h1>泡泡消消除：連減大變身</h1>

<div id="setup" class="section">
    被除數：<input type="number" id="input-dividend" value="26"> 
    除數：<input type="number" id="input-divisor" value="3">
    <button style="background:#4caf50; color:white;" onclick="startGame()">開始探索</button>
</div>

<div id="game-container" class="hidden">
    <div id="pool-section" class="section">
        <span style="font-size:1.3rem; font-weight:bold; color:#00838f;">總數剩餘：<span id="current-total"></span></span>
        <div id="bubble-pool" class="bubble-area"></div>
    </div>

    <div>
        <button id="subtract-btn" onclick="subtractOneGroup()">撳一下：減走一組</button>
        <button id="reset-btn" onclick="resetGame()">重新開始</button>
    </div>

    <div class="main-flex">
        <div class="left-col section" id="groups-section">
            <div style="text-align:left; color:#388e3c; margin-bottom:10px;">已分組泡泡：</div>
            <div id="groups-container"></div>
        </div>

        <div class="right-col">
            <div id="formula-section" class="section">
                <div style="font-size:1rem; color:#888; margin-bottom:5px;">連減算式：</div>
                <div id="formula-display"></div>
                <div id="summary-formula" class="hidden"></div>
            </div>

            <div id="longdiv-section" class="section hidden">
                <div style="font-size:1.1rem; color:#888; margin-bottom:10px;">長除法大變身：</div>
                <div class="long-div-wrapper">
                    <table class="ld-table">
                        <tr class="ld-quotient-row">
                            <td></td> 
                            <td id="res-quotient"></td>
                        </tr>
                        <tr>
                            <td class="ld-divisor-cell" id="res-divisor"></td>
                            <td class="ld-dividend-cell" id="res-dividend"></td>
                        </tr>
                        <tr class="ld-sub-row">
                            <td></td>
                            <td id="res-sub"></td>
                        </tr>
                        <tr class="ld-hr-row">
                            <td></td>
                            <td></td>
                        </tr>
                        <tr class="ld-rem-row">
                            <td></td>
                            <td id="res-rem"></td>
                        </tr>
                    </table>
                </div>
                <div style="margin-top:15px; color: #4caf50; font-weight: bold;">✅ 你成功將連減轉換成長除法！</div>
            </div>
        </div>
    </div>
</div>

<script>
    let dividend, divisor, currentRem, groupCount;
    let formulaArray = [];

    function startGame() {
        dividend = parseInt(document.getElementById('input-dividend').value);
        divisor = parseInt(document.getElementById('input-divisor').value);
        if(!dividend || divisor <= 0) {
            alert("請輸入正確的被除數同除數呀！");
            return;
        }

        currentRem = dividend;
        groupCount = 0;
        formulaArray = [dividend];

        document.getElementById('setup').classList.add('hidden');
        document.getElementById('game-container').classList.remove('hidden');
        document.getElementById('longdiv-section').classList.add('hidden');
        document.getElementById('summary-formula').classList.add('hidden');
        document.getElementById('subtract-btn').disabled = false;
        document.getElementById('groups-container').innerHTML = '';

        renderPool();
        updateFormulaUI();
    }

    function resetGame() {
        // 直接重新顯示設定介面，清空所有狀態
        document.getElementById('setup').classList.remove('hidden');
        document.getElementById('game-container').classList.add('hidden');
    }

    function renderPool() {
        document.getElementById('current-total').innerText = currentRem;
        const pool = document.getElementById('bubble-pool');
        pool.innerHTML = '';
        for (let i = 0; i < currentRem; i++) {
            let b = document.createElement('div');
            b.className = 'bubble pool-bubble';
            b.innerText = '1';
            pool.appendChild(b);
        }
    }

    function subtractOneGroup() {
        if (currentRem >= divisor) {
            currentRem -= divisor;
            groupCount++;
            formulaArray.push('<span style="color:red">- ' + divisor + '</span>');
            renderPool();
            updateFormulaUI();

            const container = document.getElementById('groups-container');
            const gBox = document.createElement('div');
            gBox.className = 'group-box';
            gBox.innerHTML = `<span style="font-size:0.7rem; color:#666">#${groupCount}</span>`;
            for(let i=0; i<divisor; i++) {
                let gb = document.createElement('div');
                gb.className = 'bubble group-bubble';
                gb.innerText = '1';
                gBox.appendChild(gb);
            }
            container.appendChild(gBox);

            if (currentRem < divisor) {
                document.getElementById('subtract-btn').disabled = true;
                formulaArray.push('= <span style="color:blue">' + currentRem + '</span>');
                updateFormulaUI();
                showSummaryAndLongDivision();
            }
        }
    }

    function updateFormulaUI() {
        document.getElementById('formula-display').innerHTML = formulaArray.join(' ');
    }

    function showSummaryAndLongDivision() {
        // 1. 顯示簡化算式
        const summaryDiv = document.getElementById('summary-formula');
        summaryDiv.innerHTML = `簡化：${dividend} - (${divisor} × ${groupCount}) = ${currentRem}`;
        summaryDiv.classList.remove('hidden');

        // 2. 顯示長除法
        document.getElementById('longdiv-section').classList.remove('hidden');
        document.getElementById('res-quotient').innerText = groupCount;
        document.getElementById('res-divisor').innerText = divisor;
        document.getElementById('res-dividend').innerText = dividend;
        document.getElementById('res-sub').innerText = divisor * groupCount;
        
        // 餘數處理：如果餘數係 0，就顯示空白字串
        document.getElementById('res-rem').innerText = (currentRem === 0) ? "" : currentRem;
    }
</script>

</body>
</html>
